version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: sentimentiq-postgres
    environment:
      POSTGRES_DB: sentimentiq
      POSTGRES_USER: sentimentiq_user
      POSTGRES_PASSWORD: sentimentiq_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sentimentiq_user -d sentimentiq" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentimentiq-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: sentimentiq-ml
    ports:
      - "8000:8000"
    volumes:
      - ./ml-service/models:/app/models
      - ./ml-service/mlflow_tracking:/app/mlflow_tracking
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 15s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentimentiq-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sentimentiq
      SPRING_DATASOURCE_USERNAME: sentimentiq_user
      SPRING_DATASOURCE_PASSWORD: sentimentiq_pass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_ML_SERVICE_URL: http://ml-service:8000
      APP_JWT_SECRET: 3cfa76ef14937c1c0ea519f8fc057a80fcd04a7e5b09b1a287a6527f65bd0820
      APP_JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentimentiq-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
